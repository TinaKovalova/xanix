<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XANIX</title>
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <div class="header__container">
                <div class="header__logo logo">
                    <img class="logo__image" src="/src/img/icons/logo.svg" alt="logo - name of company">
                </div>
                <nav class="nav">
                    <ul class="nav__list menu">
                        <li class="menu__item">
                            <a href="#" class="menu__link">Works</a>
                        </li>
                        <li class="menu__item">
                            <a href="#" class="menu__link">About</a>
                        </li>
                        <li class="menu__item">
                            <a href="#" class="menu__link">Contact</a>
                        </li>
                        <li class="menu__item">
                            <a href="#" class="menu__link">Blog</a>
                        </li>
                    </ul>
                </nav>
                <a href="#" class="button button--icon">Pricing</a>
                <button class="burger-btn">
                    <span></span>
                </button>
            </div>
        </header>
        <main class="main">
            <section class="hero">
                <div class="hero__background">
                    <img src="/src/img/bg-hero.png" alt="image" class="hero__background-image">
                </div>
                <div class="hero__container">
                    <div class="hero__content">
                        <h1 class="hero__title">
                            We’re a creative <span>design</span> agency
                        </h1>
                        <div class="hero__text">
                            Pulvinar laoreet vel eget sed facilisi felis nisi malesuada pulvinar scelerisque et velit
                            vulputate enim consectetur
                            donec lobortis mattis enim vehi.
                        </div>
                        <a href="#" class="hero__link button button--icon">Book a demo</a>
                    </div>
                </div>
            </section>
        </main>
        <footer class="footer"></footer>
    </div>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/js/index.js"></script>
</body>

</html>
